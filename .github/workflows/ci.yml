name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Dependency sanity check
        run: python -m pip check

      - name: Compile checks
        run: python -m compileall server.py korangu_server korangu_control_pyqt.py

      - name: Import checks
        run: python -c "from korangu_server.app import app; print('FastAPI app loaded')"
